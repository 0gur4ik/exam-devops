apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app-deployment
  labels:
    app: exam-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam-app
  template:
    metadata:
      labels:
        app: exam-app
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.27
        ports:
        - containerPort: 80
