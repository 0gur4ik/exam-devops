---
- name: Setup Kubernetes Environment
  hosts: all
  become: yes
  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - conntrack
        state: present
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      get_url:
        url: "https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Download and install Helm
      unarchive:
        src: "https://get.helm.sh/helm-v3.15.0-linux-amd64.tar.gz"
        dest: /tmp/
        remote_src: yes
        
    - name: Move Helm binary to /usr/local/bin
      command: mv /tmp/linux-amd64/helm /usr/local/bin/helm
      args:
        creates: /usr/local/bin/helm

    - name: Start Minikube (with Docker driver)
      command: minikube start --driver=docker --force
      environment:
        CHANGE_MINIKUBE_NONE_USER: "true"

    - name: Setup Proxy for Minikube Dashboard access
      shell: nohup kubectl proxy --address='0.0.0.0' --port=8001 --disable-filter=true > /dev/null 2>&1 &
      async: 10
      poll: 0
